<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFDB Page Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f0f0f; color: #e5e5e5; font-family: sans-serif; }
        .form-input { background: #171717; border: 1px solid #333; border-radius: 8px; padding: 12px; width: 100%; color: white; }
        .form-input:focus { outline: none; border-color: #fe3626; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans min-h-screen flex flex-col">
    <!-- Global Header -->
    <header class="bg-[#111] border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-400 hover:text-white transition-colors">
                <i data-lucide="arrow-left"></i>
            </a>
            <a href="/" class="font-bold text-xl flex items-center gap-2">
                <i data-lucide="database" class="text-red-500"></i> MFDB <span class="text-red-500">Editor</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span class="hidden sm:inline text-xs font-bold text-gray-500 uppercase tracking-widest">Editor Mode</span>
        </div>
    </header>

    <div class="flex-1 flex flex-col min-h-0">
        <!-- Docked Toolbar -->
        <div class="bg-[#171717]/80 backdrop-blur-md border-b border-gray-800 px-6 py-4 sticky top-0 z-30 flex flex-wrap gap-4 items-center justify-between min-h-[72px]">
            {% block toolbar %}
            <h1 class="font-bold text-xl">Edit Page</h1>
            <div class="flex gap-4">
                 <button onclick="document.getElementById('editor-form').submit()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-all shadow-lg shadow-red-900/20">
                    <i data-lucide="save"></i> <span class="hidden sm:inline">SAVE PAGE</span><span class="sm:hidden">SAVE</span>
                </button>
            </div>
            {% endblock %}
        </div>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
