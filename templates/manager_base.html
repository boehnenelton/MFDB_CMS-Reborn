<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFDB Site Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans min-h-screen flex flex-col">
    <!-- Global Header -->
    <header class="bg-[#111] border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button id="mobile-menu-btn" class="md:hidden text-gray-400 hover:text-white focus:outline-none">
                <i data-lucide="menu"></i>
            </button>
            <a href="/" class="font-bold text-xl flex items-center gap-2">
                <i data-lucide="database" class="text-red-500"></i> MFDB <span class="text-red-500">CMS</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span class="hidden sm:inline text-xs font-bold text-gray-500 uppercase tracking-widest">Site Manager</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-[#111] border-r border-gray-800 p-6 flex flex-col gap-4 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-200 ease-in-out scrollbar-hide overflow-y-auto">
            <h1 class="text-xl font-bold text-red-500 mb-8">SITE MANAGER</h1>
            <nav class="flex flex-col gap-2">
                <a href="/" class="p-3 hover:bg-gray-800 rounded flex items-center gap-3 transition-colors"><i data-lucide="settings"></i> General Config</a>
                <a href="/preview" class="p-3 hover:bg-gray-800 rounded flex items-center gap-3 transition-colors"><i data-lucide="eye"></i> Live Preview</a>
                <hr class="border-gray-800 my-4">
                <button onclick="window.location.href='/build_trigger'" class="p-3 bg-red-600 hover:bg-red-700 rounded text-center font-bold transition-all shadow-lg shadow-red-900/20">🚀 RUN BUILD</button>
            </nav>
        </aside>

        <!-- Sidebar Overlay (Mobile Only) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden md:hidden"></div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col h-full overflow-hidden">
            <!-- Docked Toolbar -->
            <div class="bg-[#171717]/80 backdrop-blur-md border-b border-gray-800 px-6 py-4 sticky top-0 z-30 flex flex-wrap gap-4 items-center justify-between min-h-[72px]">
                {% block toolbar %}
                <h1 class="text-xl font-bold">Manager Dashboard</h1>
                {% endblock %}
            </div>

            <!-- Scrollable Content -->
            <main class="flex-1 overflow-y-auto p-6 md:p-12">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const btn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleMenu() {
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                document.body.classList.add('overflow-hidden');
            }
        }

        btn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        sidebar.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => {
                if (window.innerWidth < 768) toggleMenu();
            });
        });
    </script>
</body>
</html>
