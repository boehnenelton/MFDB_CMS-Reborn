<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="modern-theme">
    <header class="glass">
        <nav>
            <div class="logo">BEJSON CMS</div>
            <ul>
                <li><a href="/">Home</a></li>
                {% for cat in categories %}
                <li><a href="/category/{{ cat.slug }}">{{ cat.name }}</a></li>
                {% endfor %}
            </ul>
        </nav>
    </header>
    <main>
        {{ content }}
    </main>
    <footer class="glass">
        <p>&copy; 2026 BEJSON CMS - Modern Theme</p>
    </footer>
</body>
</html>
