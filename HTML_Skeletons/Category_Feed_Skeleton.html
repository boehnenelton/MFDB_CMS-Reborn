<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Feed Header -->
    <div class="border-b border-brand-surfaceBorder pb-8 mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <span class="tag-font text-brand-red text-sm font-semibold mb-2 block uppercase">CATEGORY / {{ category_name }}</span>
            <h1 class="text-4xl font-inter font-bold">{{ category_name }}</h1>
            <p class="text-gray-400 mt-2 font-roboto max-w-2xl">{{ category_description }}</p>
        </div>
    </div>

    <!-- Dynamic Grid based on Feed Type -->
    <div class="grid {{ grid_class }} gap-8">
        {{ content_items }}
    </div>
    
    <!-- Pagination Placeholder -->
    <div class="mt-12 flex justify-center gap-2 tag-font">
        {{ pagination_html }}
    </div>
</div>
